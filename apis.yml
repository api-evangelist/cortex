apis:
- aid: cortex:cortex-rest-api
  name: Cortex REST API
  description: The Cortex REST API exposes the service catalog, scorecards, initiatives, entity relationships and dependencies,
    on-call assignments, custom data, and deployments managed in a Cortex workspace. Authentication is via personal or service
    access tokens, and entity descriptors can be retrieved as OpenAPI documents through a per-entity endpoint.
  humanURL: https://docs.cortex.io/
  properties:
  - type: Documentation
    url: https://docs.cortex.io/
  - type: GettingStarted
    url: https://docs.cortex.io/docs/getting-started
  - type: APIReference
    url: https://docs.cortex.io/reference
  - type: OpenAPI
    url: openapi/cortex-openapi.yml
  - type: NaftikoCapability
    url: capabilities/cortex-catalog.yaml
  - type: NaftikoCapability
    url: capabilities/cortex-scorecards.yaml
  - type: NaftikoCapability
    url: capabilities/cortex-teams.yaml
  tags:
  - Catalog
  - Dependencies
  - Deploys
  - REST
  - Scorecards
- aid: cortex:cortex-mcp
  name: Cortex MCP Server
  description: Cortex exposes a Model Context Protocol (MCP) server that lets AI coding assistants and IDE agents query the
    service catalog, look up ownership, check scorecard scores, and run workflows directly from developer tools.
  humanURL: https://docs.cortex.io/
  properties:
  - type: Documentation
    url: https://docs.cortex.io/
  tags:
  - AI
  - IDE
  - MCP
