aid: cortex
name: Cortex
kind: company
description: Cortex is an Engineering Operations (EngOps) platform and internal developer portal that helps engineering teams
  catalog services, enforce production readiness with scorecards, automate self-service workflows, and surface engineering
  intelligence across their organization. Cortex centralizes data from observability, CI/CD, source control, on-call, and
  SaaS tooling and exposes it through a REST API used to integrate the catalog with platform engineering and SRE workflows.
url: https://raw.githubusercontent.com/api-evangelist/cortex/refs/heads/main/apis.yml
